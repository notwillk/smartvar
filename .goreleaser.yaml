version: 2
project_name: smartvar

builds:
  - id: static
    main: ./cmd/smartvar
    binary: smartvar
    env:
      - CGO_ENABLED=0
    flags:
      - -tags=netgo,osusergo
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: curl-installer
    ids:
      - static
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

release:
  draft: false
  prerelease: auto
  extra_files:
    - glob: scripts/install.sh
