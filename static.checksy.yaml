rules:
  - name: no trailing whitespace
    check: '! grep -rn " $" --include="*.md" --include="*.yaml" --include="*.json" --include="*.txt" .'
    severity: error

  - name: no pending format issues
    check: just format --check
    fix: just format
    severity: error

  - name: go vet passes
    check: 'go vet ./...'
    severity: error

  - name: go build succeeds
    check: 'go build ./...'
    severity: error
